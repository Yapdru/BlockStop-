apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockstop-worker
  namespace: blockstop
  labels:
    app: blockstop
    component: worker
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: blockstop
      component: worker
  template:
    metadata:
      labels:
        app: blockstop
        component: worker
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: blockstop-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: worker
        image: blockstop-worker:latest
        imagePullPolicy: Always
        ports:
        - name: metrics
          containerPort: 9091
          protocol: TCP

        envFrom:
        - configMapRef:
            name: blockstop-config
        - secretRef:
            name: blockstop-db-secret
        - secretRef:
            name: blockstop-redis-secret

        env:
        - name: NODE_ENV
          value: "production"
        - name: WORKER_CONCURRENCY
          value: "4"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi

        # Workers typically don't expose HTTP endpoints
        # Use a custom check script or skip probes
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -f /tmp/worker.pid && kill -0 $(cat /tmp/worker.pid) || exit 1
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
              - ALL

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: worker-cache
          mountPath: /var/cache/blockstop
        - name: logs
          mountPath: /var/log/blockstop

      volumes:
      - name: tmp
        emptyDir: {}
      - name: worker-cache
        emptyDir: {}
      - name: logs
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - blockstop
                - key: component
                  operator: In
                  values:
                  - worker
              topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: blockstop-worker
  namespace: blockstop
  labels:
    app: blockstop
    component: worker
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: blockstop
    component: worker
  ports:
  - name: metrics
    port: 9091
    targetPort: metrics
    protocol: TCP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: blockstop-worker-pdb
  namespace: blockstop
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: blockstop
      component: worker

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blockstop-worker-hpa
  namespace: blockstop
  labels:
    app: blockstop
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blockstop-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
