apiVersion: v1
kind: Secret
metadata:
  name: blockstop-db-secret
  namespace: blockstop
  labels:
    app: blockstop
    component: database
type: Opaque
stringData:
  # NOTE: These should be replaced with actual secure values
  # Use sealed-secrets or external-secrets for production
  DATABASE_URL: postgresql://blockstop:changeme@postgres.blockstop.svc.cluster.local:5432/blockstop
  DB_HOST: postgres.blockstop.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: blockstop
  DB_USER: blockstop
  DB_PASSWORD: changeme

---
apiVersion: v1
kind: Secret
metadata:
  name: blockstop-redis-secret
  namespace: blockstop
  labels:
    app: blockstop
    component: cache
type: Opaque
stringData:
  REDIS_URL: redis://:changeme@redis.blockstop.svc.cluster.local:6379
  REDIS_HOST: redis.blockstop.svc.cluster.local
  REDIS_PORT: "6379"
  REDIS_PASSWORD: changeme
  REDIS_DB: "0"

---
apiVersion: v1
kind: Secret
metadata:
  name: blockstop-app-secret
  namespace: blockstop
  labels:
    app: blockstop
    component: application
type: Opaque
stringData:
  JWT_SECRET: change-me-to-a-secure-random-string-in-production
  SESSION_SECRET: change-me-to-a-secure-random-string-in-production
  ENCRYPTION_KEY: change-me-to-a-secure-random-string-in-production
  API_KEY: change-me-to-a-secure-random-string-in-production

---
apiVersion: v1
kind: Secret
metadata:
  name: blockstop-smtp-secret
  namespace: blockstop
  labels:
    app: blockstop
    component: email
type: Opaque
stringData:
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "587"
  SMTP_USER: noreply@blockstop.io
  SMTP_PASSWORD: changeme
  SMTP_FROM: noreply@blockstop.io

---
apiVersion: v1
kind: Secret
metadata:
  name: blockstop-oauth-secret
  namespace: blockstop
  labels:
    app: blockstop
    component: auth
type: Opaque
stringData:
  GITHUB_CLIENT_ID: changeme
  GITHUB_CLIENT_SECRET: changeme
  GOOGLE_CLIENT_ID: changeme
  GOOGLE_CLIENT_SECRET: changeme
  MICROSOFT_CLIENT_ID: changeme
  MICROSOFT_CLIENT_SECRET: changeme

---
apiVersion: v1
kind: Secret
metadata:
  name: blockstop-aws-secret
  namespace: blockstop
  labels:
    app: blockstop
    component: cloud
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: changeme
  AWS_SECRET_ACCESS_KEY: changeme
  AWS_REGION: us-east-1
  AWS_S3_BUCKET: blockstop-production
  AWS_S3_REGION: us-east-1

---
apiVersion: v1
kind: Secret
metadata:
  name: blockstop-tls-secret
  namespace: blockstop
  labels:
    app: blockstop
    component: ingress
type: kubernetes.io/tls
data:
  # These are base64 encoded self-signed certificates for testing
  # Replace with actual certificates in production
  tls.crt: 
  tls.key: 

