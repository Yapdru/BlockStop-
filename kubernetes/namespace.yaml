apiVersion: v1
kind: Namespace
metadata:
  name: blockstop
  labels:
    name: blockstop
    environment: production
    managed-by: terraform

---
# Network Policy for namespace isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockstop-network-policy
  namespace: blockstop
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: blockstop
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
  egress:
    - to:
        - namespaceSelector: {}
    - to:
        - podSelector: {}
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53

---
# Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: blockstop-quota
  namespace: blockstop
spec:
  hard:
    requests.cpu: "100"
    requests.memory: 200Gi
    limits.cpu: "150"
    limits.memory: 300Gi
    pods: "100"
    services: "20"
    persistentvolumeclaims: "10"

---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: blockstop
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow Prometheus monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus
  namespace: blockstop
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
