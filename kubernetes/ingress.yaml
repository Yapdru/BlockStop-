apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blockstop-ingress
  namespace: blockstop
  labels:
    app: blockstop
    component: ingress
  annotations:
    # Nginx Ingress Controller
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Security headers
    nginx.ingress.kubernetes.io/add-headers: blockstop/security-headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: no-referrer-when-downgrade";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"

    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # Compression
    nginx.ingress.kubernetes.io/enable-compression: "true"
    nginx.ingress.kubernetes.io/compression-level: "6"

    # Buffering
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "4k"

spec:
  tls:
  - hosts:
    - blockstop.io
    - api.blockstop.io
    - dashboard.blockstop.io
    secretName: blockstop-tls-cert
  rules:
  - host: blockstop.io
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: blockstop-api
            port:
              number: 4000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blockstop-web
            port:
              number: 3000

  - host: api.blockstop.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blockstop-api
            port:
              number: 4000

  - host: dashboard.blockstop.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blockstop-web
            port:
              number: 3000

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@blockstop.io
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@blockstop.io
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: security-headers
  namespace: blockstop
data:
  X-Frame-Options: SAMEORIGIN
  X-Content-Type-Options: nosniff
  X-XSS-Protection: "1; mode=block"
  Referrer-Policy: "no-referrer-when-downgrade"
  Strict-Transport-Security: "max-age=31536000; includeSubDomains"

---
# Alternative: If using AWS ALB Ingress Controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blockstop-ingress-alb
  namespace: blockstop
  labels:
    app: blockstop
    component: ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/1234abcd-12ab-34cd-56ef-1234567890ab
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS-1-2-2017-01
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/load-balancer-attributes: |
      deletion_protection.enabled=true,
      idle_timeout.connection.termination.on_deregistration.timeout=30,
      load_balancing.http.drop_invalid_header_fields.enabled=true
spec:
  ingressClassName: alb
  rules:
  - host: blockstop.io
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: blockstop-api
            port:
              number: 4000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: blockstop-web
            port:
              number: 3000
