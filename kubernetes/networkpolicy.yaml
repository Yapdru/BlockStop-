---
# Deny all ingress traffic by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockstop-default-deny-ingress
  namespace: blockstop
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow API to receive traffic from Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockstop-api-allow-ingress
  namespace: blockstop
spec:
  podSelector:
    matchLabels:
      app: blockstop-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

---
# Allow Web to receive traffic from Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockstop-web-allow-ingress
  namespace: blockstop
spec:
  podSelector:
    matchLabels:
      app: blockstop-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

---
# Allow API to communicate with Database
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockstop-api-allow-database
  namespace: blockstop
spec:
  podSelector:
    matchLabels:
      app: blockstop-api
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: blockstop
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

---
# Allow API to communicate with Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockstop-api-allow-redis
  namespace: blockstop
spec:
  podSelector:
    matchLabels:
      app: blockstop-api
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: blockstop
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

---
# Allow Worker to communicate with Database and Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockstop-worker-allow-backend
  namespace: blockstop
spec:
  podSelector:
    matchLabels:
      app: blockstop-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: blockstop
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              name: blockstop
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

---
# Allow internal communication between API and Worker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockstop-internal-allow
  namespace: blockstop
spec:
  podSelector:
    matchLabels:
      app: blockstop-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: blockstop-worker
      ports:
        - protocol: TCP
          port: 3000
