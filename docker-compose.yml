version: '3.8'

services:
  blockos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blockstop-pro
    ports:
      - "3000:3000"
      - "5432:5432"
    environment:
      - NODE_ENV=production
      - BLOCKOS_VERSION=1.0.0
      - DATABASE_URL=postgresql://blockstop:secure_password@postgres:5432/blockstop_pro
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-secret-key-here
    volumes:
      - blockstop_data:/var/lib/blockstop
      - blockstop_logs:/var/log/blockstop
      - ./app:/app/app
      - ./lib:/app/lib
    depends_on:
      - postgres
    networks:
      - blockstop_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: blockstop-db
    environment:
      - POSTGRES_USER=blockstop
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=blockstop_pro
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./blockos/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - blockstop_network
    restart: unless-stopped

volumes:
  blockstop_data:
  blockstop_logs:
  postgres_data:

networks:
  blockstop_network:
    driver: bridge
