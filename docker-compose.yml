version: '3.9'

# BlockStop Multi-Container Application - Development
# Local development and testing environment
#
# Services:
# - db: PostgreSQL database (PostgreSQL 15+)
# - redis: Redis cache and session store
# - api: Node.js/Express backend API
# - web: Next.js frontend application
# - nginx: Reverse proxy and static files
# - pgadmin: PostgreSQL management UI (dev only)
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f api
#   docker-compose down

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: blockstop-db
    environment:
      POSTGRES_USER: ${DB_USER:-blockstop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blockstop_dev_password}
      POSTGRES_DB: ${DB_NAME:-blockstop_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/blockstop
    ports:
      - "5432:5432"
    volumes:
      - blockstop_db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
      - ./blockos/init-db.sql:/docker-entrypoint-initdb.d/02-blockos.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockstop"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blockstop-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /run
      - /tmp

  # Redis Cache and Session Store
  redis:
    image: redis:7-alpine
    container_name: blockstop-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-blockstop_redis_password}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - blockstop_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blockstop-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.core.somaxconn=65535

  # Node.js Backend API
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        NODE_ENV: development
    container_name: blockstop-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3001}
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${DB_USER:-blockstop}:${DB_PASSWORD:-blockstop_dev_password}@db:5432/${DB_NAME:-blockstop_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-blockstop_redis_password}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-dev-client-id}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-dev-client-secret}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CORS_CREDENTIALS: "true"
      RATE_LIMIT_WINDOW: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "3001:3001"
      - "9229:9229"  # Node debug port
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./lib:/app/lib
      - ./scripts:/app/scripts
      - ./database:/app/database
      - blockstop_api_logs:/app/logs
      - /app/node_modules
    networks:
      - blockstop-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NODE_ENV: development
    container_name: blockstop-web
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./public:/app/public
      - ./types:/app/types
      - blockstop_web_logs:/app/logs
      - /app/node_modules
      - /app/.next
    networks:
      - blockstop-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Nginx Reverse Proxy and Static Files
  nginx:
    image: nginx:1.25-alpine
    container_name: blockstop-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./public:/usr/share/nginx/html:ro
      - blockstop_nginx_cache:/var/cache/nginx
      - blockstop_nginx_logs:/var/log/nginx
    depends_on:
      - web
      - api
    networks:
      - blockstop-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # pgAdmin for Database Management (Development Only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: blockstop-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@blockstop.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      SCRIPT_NAME: /pgadmin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blockstop-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    profiles:
      - dev

volumes:
  blockstop_db_data:
    driver: local
  blockstop_redis_data:
    driver: local
  blockstop_api_logs:
    driver: local
  blockstop_web_logs:
    driver: local
  blockstop_nginx_cache:
    driver: local
  blockstop_nginx_logs:
    driver: local

networks:
  blockstop-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
