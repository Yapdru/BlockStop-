# Field extractions
[blockstop_scan_extract]
REGEX = scanId[\":](\w+)
FORMAT = scan_id::$1

[blockstop_risk_extract]
REGEX = riskScore[\":](\d+)
FORMAT = risk_score::$1

[blockstop_malware_extract]
REGEX = malwareDetected[\":](\w+)
FORMAT = malware_detected::$1

# Event enrichment via lookup
[blockstop_threat_lookup]
filename = blockstop_threats.csv
match_type = WILDCARD(threat_type)
default_match = unknown

[blockstop_file_hash_lookup]
filename = blockstop_file_hashes.csv
match_type = EXACT(file_hash)

# Metrics extraction
[blockstop_scan_metrics]
REGEX =
TRANSFORMS-metrics = blockstop_scan_stats

# Routing by severity
[blockstop_severity_routing]
REGEX = severity=(critical|high)
TRANSFORMS = route_to_critical

[route_to_critical]
REGEX = .
FORMAT = critical_event::true
DEST_KEY = _MetaData:Index
REGEX = severity=(critical|high)
