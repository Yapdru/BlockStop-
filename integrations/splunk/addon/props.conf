[blockstop:scan]
TRUNCATE = 100000
TIME_PREFIX = \"timestamp\":
TIME_FORMAT = %s
TIMESTAMP_FIELDS = timestamp
MAX_TIMESTAMP_LOOKAHEAD = 25
SHOULD_LINEMERGE = false
INTERVAL = 300
FIELDALIAS-blockstop_scan = scanId as scan_id, riskScore as risk_score, malwareDetected as malware_detected, fileName as file_name
EVAL-event_type = if(malware_detected, "threat_detected", "scan_completed")
EVAL-severity = case(risk_score > 70, "high", risk_score > 40, "medium", 1, "low")

[blockstop:ingest]
TRUNCATE = 100000
MAX_TIMESTAMP_LOOKAHEAD = 25
SHOULD_LINEMERGE = false
FIELDALIAS-blockstop_ingest = source::source, data::data, event_type::event_type
EVAL-risk_level = case(severity="high", 3, severity="medium", 2, severity="low", 1)

[blockstop:raw]
TRUNCATE = 100000
SHOULD_LINEMERGE = false
TIME_PREFIX = timestamp=
TIME_FORMAT = %s
