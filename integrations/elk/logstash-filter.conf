# Logstash filter configuration for BlockStop events

filter {
  if [source] == "blockstop" {
    # Parse JSON if nested
    if [message] {
      json {
        source => "message"
        target => "blockstop"
        skip_on_invalid_json => true
      }
    }

    # Extract fields from BlockStop events
    mutate {
      add_field => {
        "[@metadata][index]" => "blockstop-scan"
      }

      rename => {
        "[blockstop][scanId]" => "[event][scan_id]"
        "[blockstop][fileName]" => "[file][name]"
        "[blockstop][fileSize]" => "[file][size]"
        "[blockstop][filePath]" => "[file][path]"
        "[blockstop][malwareDetected]" => "[blockstop][malware_detected]"
        "[blockstop][riskScore]" => "[blockstop][risk_score]"
        "[blockstop][threats]" => "[blockstop][threats]"
      }

      remove_field => ["message"]
    }

    # Normalize timestamp
    if [blockstop][timestamp] {
      date {
        match => ["[blockstop][timestamp]", "UNIX"]
        target => "@timestamp"
      }
    }

    # Set event severity based on risk score
    if [blockstop][risk_score] {
      ruby {
        code => '
          risk_score = event.get("[blockstop][risk_score]").to_i
          severity = case risk_score
            when 0..30
              "low"
            when 31..60
              "medium"
            when 61..85
              "high"
            else
              "critical"
          end
          event.set("[event][severity]", severity)
        '
      }
    }

    # Set event type based on malware detection
    if [blockstop][malware_detected] == true {
      mutate {
        add_field => {
          "[event][type]" => "threat_detected"
          "[event][action]" => "detection"
        }
      }
    } else {
      mutate {
        add_field => {
          "[event][type]" => "scan_completed"
          "[event][action]" => "info"
        }
      }
    }

    # Add event category
    mutate {
      add_field => {
        "[event][category]" => "malware"
        "[event][module]" => "blockstop"
        "[agent][name]" => "BlockStop"
        "[agent][type]" => "security"
      }
    }

    # Grok patterns for additional extraction if needed
    if [file][name] {
      grok {
        match => {
          "[file][name]" => "(?<[file][extension]>\w+)$"
        }
        overwrite => ["[file][extension]"]
        keep_empty_captures => false
      }
    }

    # Lookup threat intelligence
    if [blockstop][threats] {
      ruby {
        code => '
          threats = event.get("[blockstop][threats]")
          if threats.is_a?(Array)
            threat_names = threats.map { |t| t.is_a?(Hash) ? t["type"] : t }.compact
            event.set("[threat][detected]", !threat_names.empty?)
            event.set("[threat][types]", threat_names) if threat_names.any?
          end
        '
      }
    }

    # Clean up temporary fields
    mutate {
      remove_field => ["blockstop"]
    }
  }
}
