name: Deploy to Production

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: blockstop-cluster-prod
  KUBE_NAMESPACE: blockstop

jobs:
  pre-deployment-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check code quality
        run: |
          echo "Verifying code quality standards..."
          # Add your quality checks here

      - name: Verify security
        run: |
          echo "Running security verification..."
          # Add security checks

      - name: Get version
        id: version
        run: |
          VERSION=${{ github.ref_name }}
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="prod-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs: pre-deployment-checks
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-duration-seconds: 3600
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images
        run: |
          VERSION=${{ needs.pre-deployment-checks.outputs.version }}

          docker buildx build \
            --file docker/Dockerfile.web \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:$VERSION \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest \
            --push .

          docker buildx build \
            --file docker/Dockerfile.api \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:$VERSION \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest \
            --push .

          docker buildx build \
            --file docker/Dockerfile.worker \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:$VERSION \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:latest \
            --push .

      - name: Create backup
        run: |
          echo "Creating database backup..."
          kubectl exec -n ${{ env.KUBE_NAMESPACE }} \
            $(kubectl get pod -n ${{ env.KUBE_NAMESPACE }} -l app=postgres -o jsonpath='{.items[0].metadata.name}') \
            -- pg_dump -U blockstop blockstop | gzip > backup-$(date +%Y%m%d-%H%M%S).sql.gz

      - name: Update Kubernetes deployment with blue-green strategy
        run: |
          VERSION=${{ needs.pre-deployment-checks.outputs.version }}

          # Create new deployment with suffix
          kubectl set image deployment/blockstop-api \
            -n ${{ env.KUBE_NAMESPACE }} \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:$VERSION \
            --record

          kubectl set image deployment/blockstop-web \
            -n ${{ env.KUBE_NAMESPACE }} \
            web=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:$VERSION \
            --record

          kubectl set image deployment/blockstop-worker \
            -n ${{ env.KUBE_NAMESPACE }} \
            worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:$VERSION \
            --record

      - name: Wait for rollout with health checks
        run: |
          set -e

          echo "Waiting for API deployment..."
          kubectl rollout status deployment/blockstop-api \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=10m

          echo "Waiting for Web deployment..."
          kubectl rollout status deployment/blockstop-web \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=10m

          echo "Waiting for Worker deployment..."
          kubectl rollout status deployment/blockstop-worker \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=10m

          # Wait for pods to be ready
          sleep 30
          kubectl get pods -n ${{ env.KUBE_NAMESPACE }}

      - name: Run comprehensive health checks
        run: |
          echo "Running health checks..."

          API_POD=$(kubectl get pod -n ${{ env.KUBE_NAMESPACE }} -l app=blockstop,component=api -o jsonpath='{.items[0].metadata.name}')
          WEB_POD=$(kubectl get pod -n ${{ env.KUBE_NAMESPACE }} -l app=blockstop,component=web -o jsonpath='{.items[0].metadata.name}')

          # Check API health
          echo "Checking API health..."
          kubectl exec -n ${{ env.KUBE_NAMESPACE }} $API_POD -- curl -f http://localhost:4000/health || exit 1

          # Check Web health
          echo "Checking Web health..."
          kubectl exec -n ${{ env.KUBE_NAMESPACE }} $WEB_POD -- curl -f http://localhost:3000/health || exit 1

          echo "✅ All health checks passed"

      - name: Verify database connectivity
        run: |
          echo "Verifying database connectivity..."

          API_POD=$(kubectl get pod -n ${{ env.KUBE_NAMESPACE }} -l app=blockstop,component=api -o jsonpath='{.items[0].metadata.name}')

          # Test database connection
          kubectl exec -n ${{ env.KUBE_NAMESPACE }} $API_POD -- \
            npm run db:migrate:status || true

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."

          # Get ingress URL
          INGRESS_URL=$(kubectl get ingress blockstop-ingress -n ${{ env.KUBE_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          # Wait for ingress to be ready
          for i in {1..60}; do
            if curl -f http://$INGRESS_URL/health 2>/dev/null; then
              echo "✅ Application is responding"
              break
            fi
            echo "Waiting for application... ($i/60)"
            sleep 10
          done

      - name: Send deployment notification
        if: always()
        run: |
          STATUS="success"
          if [[ $? -ne 0 ]]; then
            STATUS="failure"
          fi

          echo "Deployment Status: $STATUS"
          echo "Version: ${{ needs.pre-deployment-checks.outputs.version }}"
          echo "Deployed at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

  post-deployment:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release notes
        run: |
          echo "## Production Deployment" > RELEASE_NOTES.md
          echo "- Version: ${{ github.ref_name }}" >> RELEASE_NOTES.md
          echo "- Commit: ${{ github.sha }}" >> RELEASE_NOTES.md
          echo "- Deployed at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> RELEASE_NOTES.md

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false

      - name: Archive deployment logs
        run: |
          echo "Deployment completed successfully"
