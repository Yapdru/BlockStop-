name: Deploy to Staging

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_run:
    workflows: ["PR Tests and Quality Checks"]
    types: [completed]
    branches: [develop]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: blockstop
          tags: |
            type=raw,value=staging-latest
            type=sha,prefix=staging-

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=blockstop:staging-latest
          cache-to: type=inline

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to staging cluster
        run: |
          echo "Deploying to staging..."
          # Example kubectl command (replace with actual deployment)
          # kubectl set image deployment/blockstop-staging \
          #   app=blockstop:staging-latest \
          #   -n blockstop-staging
          echo "✓ Staging deployment initiated"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Staging deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nBranch: develop"
                  }
                }
              ]
            }
