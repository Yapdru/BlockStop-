name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: blockstop-cluster-staging
  KUBE_NAMESPACE: blockstop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-duration-seconds: 900
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker images
        run: |
          docker buildx build \
            --file docker/Dockerfile.web \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:staging-${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:staging-latest \
            --push .

          docker buildx build \
            --file docker/Dockerfile.api \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:staging-${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:staging-latest \
            --push .

          docker buildx build \
            --file docker/Dockerfile.worker \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:staging-${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:staging-latest \
            --push .

      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/blockstop-api \
            -n ${{ env.KUBE_NAMESPACE }} \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:staging-${{ github.sha }} \
            --record

          kubectl set image deployment/blockstop-web \
            -n ${{ env.KUBE_NAMESPACE }} \
            web=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:staging-${{ github.sha }} \
            --record

          kubectl set image deployment/blockstop-worker \
            -n ${{ env.KUBE_NAMESPACE }} \
            worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:staging-${{ github.sha }} \
            --record

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/blockstop-api \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=5m

          kubectl rollout status deployment/blockstop-web \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=5m

          kubectl rollout status deployment/blockstop-worker \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=5m

      - name: Run smoke tests
        run: |
          API_URL=$(kubectl get service blockstop-api -n ${{ env.KUBE_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          # Wait for service to be ready
          for i in {1..30}; do
            if curl -f http://$API_URL:4000/health; then
              echo "API is healthy"
              break
            fi
            echo "Waiting for API to be ready... ($i/30)"
            sleep 10
          done

      - name: Create deployment annotation
        run: |
          kubectl annotate deployment blockstop-api \
            -n ${{ env.KUBE_NAMESPACE }} \
            deployment.kubernetes.io/revision="staging-${{ github.sha }}" \
            --overwrite

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Staging deployment successful"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Staging deployment failed"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
